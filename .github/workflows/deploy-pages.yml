name: Deploy to GitHub Pages

on:
  push:
    branches: ['**']

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deploy path
        id: path
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "deploy_path=." >> $GITHUB_OUTPUT
            echo "branch_display=main (root)" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME="${{ github.ref_name }}"
            SANITIZED_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
            echo "deploy_path=branches/$SANITIZED_NAME" >> $GITHUB_OUTPUT
            echo "branch_display=$BRANCH_NAME (branches/$SANITIZED_NAME)" >> $GITHUB_OUTPUT
          fi

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-repo
        continue-on-error: true

      - name: Create deploy directory structure
        run: |
          mkdir -p gh-pages-repo
          if [ "${{ steps.path.outputs.deploy_path }}" != "." ]; then
            mkdir -p "gh-pages-repo/${{ steps.path.outputs.deploy_path }}"
            rm -rf "gh-pages-repo/${{ steps.path.outputs.deploy_path }}"/*
            cp -r . "gh-pages-repo/${{ steps.path.outputs.deploy_path }}" --exclude=gh-pages-repo --exclude=.git
          else
            cp -r . gh-pages-repo/ --exclude=gh-pages-repo --exclude=.git --exclude=branches
            mkdir -p gh-pages-repo/branches
          fi

      - name: Deploy to gh-pages branch
        run: |
          cd gh-pages-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "🚀 Deploy: ${{ steps.path.outputs.branch_display }}" || echo "No changes to commit"
          git push origin gh-pages

      - name: Print deployment info
        run: |
          echo "✅ Deployed ${{ steps.path.outputs.branch_display }}"
          echo "📍 URL: https://bdtgif.github.io/PokerNotes/${{ steps.path.outputs.deploy_path }}"

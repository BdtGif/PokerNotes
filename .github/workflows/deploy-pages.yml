name: Deploy to GitHub Pages

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  deployments: write
  pull-requests: write
  issues: write

# All branches write to the same gh-pages branch, so we serialize.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pushed branch
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout main (production root)
        uses: actions/checkout@v4
        with:
          ref: main
          path: source-main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build gh-pages tree, deploy, comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node source/scripts/ci/deploy.js

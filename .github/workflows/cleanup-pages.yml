name: Cleanup deleted branch from GitHub Pages

on:
  delete:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  cleanup:
    if: github.event.ref_type == 'branch' && github.event.ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (for scripts)
        uses: actions/checkout@v4
        with:
          ref: main
          path: source-main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DELETED_BRANCH: ${{ github.event.ref }}
        run: node source-main/scripts/ci/cleanup.js
